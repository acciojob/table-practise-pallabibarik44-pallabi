<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>

    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        table {
            background-color: yellow;
        }
    </style>

</head>
<body>

<h1>HTML Student Details Table</h1>

<table>
    <caption>Student Details</caption>

    <tr>
        <th>NAME</th>
        <th>AGE</th>
        <th>BRANCH</th>
    </tr>

    <tr>
        <td>Shaw</td>
        <td>20</td>
        <td>CSE</td>
    </tr>

    <tr>
        <td>Adil</td>
        <td>21</td>
        <td>ECE</td>
    </tr>

</table>

</body>
</html>
